apiVersion: apps/v1
kind: Deployment
metadata:
  name: habit-tracker-frontend
  labels:
    app: habit-tracker-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: habit-tracker-frontend
  template:
    metadata:
      labels:
        app: habit-tracker-frontend
    spec:
      containers:
        - name: frontend
          image: habit-tracker-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_URL
              value: "http://backend-service:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  selector:
    app: habit-tracker-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
