name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend (Maven)
        working-directory: ./final-project/backend(springboot)/habit-track
        run: mvn clean package -DskipTests

      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Build Frontend (npm install + build)
        working-directory: ./final-project/frontend(react)
        run: |
          npm install
          npm run build

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./final-project/backend(springboot)/habit-track
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/habit-tracker-backend:latest

      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./final-project/frontend(react)
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/habit-tracker-frontend:latest

      - name: Deploy to Kubernetes Cluster
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Apply Kubernetes YAMLs
        run: kubectl apply -f k8s/
