name: CI/CD Pipeline PRO Extreme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug File Structure
        run: |
          echo "Current working directory: $(pwd)"
          ls -R

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend (Maven)
        working-directory: ./final-project/backend/habit-track
        run: |
          echo "Checking for pom.xml in $(pwd)"
          ls -la pom.xml
          mvn clean package -DskipTests -B

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './final-project/frontend/package-lock.json'

      - name: Build Frontend (npm install + build)
        working-directory: ./final-project/frontend
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Docker Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./final-project/backend/habit-track
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/habit-tracker-backend:latest

      - name: Build and Push Frontend Docker Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./final-project/frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/habit-tracker-frontend:latest

      - name: Deploy to Kubernetes Cluster
        if: github.ref == 'refs/heads/main'
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Apply Kubernetes YAMLs
        if: github.ref == 'refs/heads/main'
        run: kubectl apply -f k8s/
